name = "beloveful-visions"
main = "src/worker.js"
compatibility_date = "2025-09-01"
workers_dev = false

# Cloudflare's route matcher is more reliable with explicit host routes.
# Use separate entries for the apex and www hostnames.
[[routes]]
pattern = "beloveful.com/*"
zone_name = "beloveful.com"

[[routes]]
pattern = "www.beloveful.com/*"
zone_name = "beloveful.com"

[assets]
directory = "dist"
binding = "ASSETS"

# R2 bucket configuration
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "beloveful"

# Database configuration
[[d1_databases]]
binding = "DB"
database_name = "beloveful-cms"
database_id = "5974f712-89ce-491f-baf7-37b7dcfa91cb"

# Environment variables (set via wrangler secret put)
# Required AI secret:
# - DASHSCOPE_API_KEY
#
# Optional contact form vars:
# - CONTACT_FORM_TO_EMAIL
# - CONTACT_FORM_FROM_EMAIL
# - CONTACT_FORM_FROM_NAME
# - CONTACT_FORM_DELIVERY_MODE
# - CONTACT_FORM_REQUEST_TIMEOUT_MS
# - MAILCHANNELS_API_URL
# - RESEND_API_KEY
# - RESEND_API_URL
#
# To set secrets, run:
# wrangler secret put DASHSCOPE_API_KEY
