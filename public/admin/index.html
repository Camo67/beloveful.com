<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beloveful Admin Console</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f4f0e8;
        color: #1c1917;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(120deg, rgba(28, 25, 23, 0.78), rgba(68, 64, 60, 0.36)),
          url("/TonyMenias-3.jpg") center / cover fixed;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .panel {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .intro {
        padding: 42px;
        background: rgba(28, 25, 23, 0.9);
        color: white;
      }

      .intro h1 {
        margin: 0 0 16px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 500;
        line-height: 1;
      }

      .intro p {
        max-width: 36rem;
        margin: 0;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.7;
      }

      .console {
        padding: 32px;
        background: #fffaf2;
      }

      h2 {
        margin: 0;
        font-size: 22px;
      }

      .muted {
        margin: 8px 0 0;
        color: #78716c;
        font-size: 14px;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      label {
        display: grid;
        gap: 7px;
        color: #44403c;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 42px;
        border: 1px solid #d6d3d1;
        border-radius: 6px;
        padding: 0 12px;
        background: white;
        color: #1c1917;
        font: inherit;
      }

      button,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border: 1px solid #1c1917;
        border-radius: 6px;
        padding: 0 14px;
        background: #1c1917;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      button.secondary,
      .button.secondary {
        background: transparent;
        color: #1c1917;
      }

      .status-list {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid #e7e5e4;
        border-radius: 6px;
        padding: 11px 12px;
        background: white;
      }

      .status-row strong {
        display: block;
        font-size: 14px;
      }

      .status-row span {
        display: block;
        margin-top: 3px;
        color: #78716c;
        font-size: 12px;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 4px 9px;
        background: #fef3c7;
        color: #92400e;
        font-size: 12px;
        font-weight: 700;
      }

      .badge.ok {
        background: #dcfce7;
        color: #166534;
      }

      .message {
        min-height: 20px;
        margin-top: 12px;
        color: #b91c1c;
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      @media (max-width: 800px) {
        .panel {
          grid-template-columns: 1fr;
        }

        .intro,
        .console {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="admin-title">
        <div class="intro">
          <h1 id="admin-title">Beloveful Admin</h1>
          <p>
            Direct backend console for checking API health, signing in, and opening the full
            content management workspace.
          </p>
        </div>

        <div class="console">
          <h2>Admin access</h2>
          <p class="muted" id="setup-summary">Checking admin setup...</p>

          <form id="login-form">
            <label>
              Username
              <input name="username" autocomplete="username" required />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Sign in</button>
          </form>

          <div class="message" id="message" role="status"></div>

          <div class="actions">
            <a class="button secondary" href="/adminlogin">Open full admin UI</a>
            <button class="secondary" type="button" id="refresh-status">Refresh status</button>
          </div>

          <div class="status-list" id="status-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const setupSummary = document.getElementById("setup-summary");
      const statusList = document.getElementById("status-list");
      const refreshButton = document.getElementById("refresh-status");

      function setMessage(text, isError = true) {
        message.textContent = text;
        message.style.color = isError ? "#b91c1c" : "#166534";
      }

      async function readJson(response) {
        const contentType = response.headers.get("Content-Type") || "";
        if (!contentType.includes("application/json")) {
          throw new Error(`Expected JSON, got ${contentType || "unknown content type"}`);
        }
        return response.json();
      }

      async function check(label, url, options, describe) {
        try {
          const response = await fetch(url, options);
          const data = await readJson(response);
          if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
          return {
            label,
            ok: true,
            detail: describe ? describe(data) : "Online",
          };
        } catch (error) {
          return {
            label,
            ok: false,
            detail: error.message || "Unavailable",
          };
        }
      }

      function renderStatuses(statuses) {
        statusList.innerHTML = "";
        for (const status of statuses) {
          const row = document.createElement("div");
          row.className = "status-row";
          row.innerHTML = `
            <div>
              <strong>${status.label}</strong>
              <span>${status.detail}</span>
            </div>
            <div class="badge ${status.ok ? "ok" : ""}">${status.ok ? "OK" : "Check"}</div>
          `;
          statusList.appendChild(row);
        }
      }

      async function refreshStatus() {
        const token = localStorage.getItem("admin_token");
        const statuses = await Promise.all([
          check("Worker health", "/api/health"),
          check("Admin setup", "/api/auth/setup", undefined, (data) =>
            data.needsSetup ? "Setup required" : "Admin account exists",
          ),
          check("Print shop API", "/api/print-innovation/products", undefined, (data) =>
            `${data.count || 0} products synced`,
          ),
          token
            ? check(
                "Admin database",
                "/api/albums/admin/all",
                { headers: { Authorization: `Bearer ${token}` } },
                (data) => `${(data.albums || []).length} albums available`,
              )
            : Promise.resolve({
                label: "Admin database",
                ok: false,
                detail: "Sign in to check protected admin data",
              }),
        ]);

        renderStatuses(statuses);
        setupSummary.textContent =
          statuses.find((status) => status.label === "Admin setup")?.detail || "Ready";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("");
        const payload = Object.fromEntries(new FormData(form).entries());

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await readJson(response);

          if (!response.ok || !data.success || !data.token) {
            throw new Error(data.error || "Login failed");
          }

          localStorage.setItem("admin_token", data.token);
          localStorage.setItem("admin_user", JSON.stringify(data.user));
          setMessage("Signed in. Opening full admin UI...", false);
          await refreshStatus();
          window.location.href = "/adminlogin";
        } catch (error) {
          setMessage(error.message || "Login failed");
        }
      });

      refreshButton.addEventListener("click", refreshStatus);
      refreshStatus();
    </script>
  </body>
</html>
